name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false  # 🔑 Evita que use el GITHUB_TOKEN automático

      - name: Create config.js from secrets
        run: |
          echo "// Archivo generado automáticamente" > config.js
          echo "const TELEGRAM_CONFIG = {" >> config.js
          echo "    token: '${{ secrets.TELEGRAM_TOKEN }}'," >> config.js
          echo "    chatId: '${{ secrets.TELEGRAM_CHAT_ID }}'," >> config.js
          echo "    username: '${{ secrets.TELEGRAM_USERNAME }}'" >> config.js
          echo "};" >> config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ./
          token: ${{ secrets.DEPLOY_TOKEN }}  # 🔑 Usa tu token personal
